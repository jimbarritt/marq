<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Sky -->
  <rect width="400" height="300" fill="#e8f4fd"/>

  <!-- Ground -->
  <rect y="250" width="400" height="50" fill="#90c695"/>

  <!-- Sun -->
  <circle cx="340" cy="50" r="30" fill="#ffd93d"/>

  <!-- Bicycle - back wheel -->
  <circle cx="140" cy="230" r="35" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="140" cy="230" r="3" fill="#333"/>
  <!-- Spokes -->
  <line x1="140" y1="195" x2="140" y2="265" stroke="#666" stroke-width="1"/>
  <line x1="105" y1="230" x2="175" y2="230" stroke="#666" stroke-width="1"/>
  <line x1="115" y1="205" x2="165" y2="255" stroke="#666" stroke-width="1"/>
  <line x1="165" y1="205" x2="115" y2="255" stroke="#666" stroke-width="1"/>

  <!-- Bicycle - front wheel -->
  <circle cx="260" cy="230" r="35" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="260" cy="230" r="3" fill="#333"/>
  <!-- Spokes -->
  <line x1="260" y1="195" x2="260" y2="265" stroke="#666" stroke-width="1"/>
  <line x1="225" y1="230" x2="295" y2="230" stroke="#666" stroke-width="1"/>
  <line x1="235" y1="205" x2="285" y2="255" stroke="#666" stroke-width="1"/>
  <line x1="285" y1="205" x2="235" y2="255" stroke="#666" stroke-width="1"/>

  <!-- Bicycle frame -->
  <line x1="140" y1="230" x2="190" y2="190" stroke="#e74c3c" stroke-width="4"/>
  <line x1="190" y1="190" x2="260" y2="230" stroke="#e74c3c" stroke-width="4"/>
  <line x1="190" y1="190" x2="240" y2="190" stroke="#e74c3c" stroke-width="4"/>
  <line x1="240" y1="190" x2="260" y2="230" stroke="#e74c3c" stroke-width="4"/>
  <line x1="240" y1="190" x2="250" y2="160" stroke="#e74c3c" stroke-width="3"/>

  <!-- Handlebars -->
  <line x1="240" y1="158" x2="265" y2="155" stroke="#333" stroke-width="3"/>
  <line x1="240" y1="158" x2="235" y2="150" stroke="#333" stroke-width="3"/>

  <!-- Seat -->
  <rect x="182" y="183" width="20" height="5" rx="2" fill="#333"/>

  <!-- Pedals -->
  <circle cx="190" cy="220" r="8" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="183" y1="215" x2="197" y2="225" stroke="#333" stroke-width="2"/>

  <!-- Pelican body -->
  <ellipse cx="190" cy="145" rx="35" ry="30" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>

  <!-- Pelican neck -->
  <path d="M 210 130 Q 230 100 225 70" fill="none" stroke="#f5f5f5" stroke-width="18"/>
  <path d="M 210 130 Q 230 100 225 70" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Pelican head -->
  <circle cx="225" cy="62" r="14" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>

  <!-- Pelican eye -->
  <circle cx="230" cy="58" r="3" fill="#333"/>
  <circle cx="231" cy="57" r="1" fill="white"/>

  <!-- Pelican beak -->
  <path d="M 238 62 L 275 68 L 238 74 Z" fill="#f4a460"/>
  <!-- Pouch -->
  <path d="M 238 68 Q 260 82 238 74" fill="#e8956d" stroke="none"/>

  <!-- Pelican wing -->
  <path d="M 170 130 Q 150 145 155 165 Q 175 155 195 150" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>

  <!-- Pelican feet on pedals -->
  <path d="M 180 175 L 185 215" stroke="#f4a460" stroke-width="3" fill="none"/>
  <path d="M 200 175 L 195 215" stroke="#f4a460" stroke-width="3" fill="none"/>
  <path d="M 182 215 L 192 218" stroke="#f4a460" stroke-width="2"/>
  <path d="M 192" stroke="#f4a460" stroke-width="2"/>

  <!-- Little hat -->
  <rect x="215" y="46" width="20" height="6" rx="1" fill="#e74c3c"/>
  <rect x="220" y="36" width="10" height="12" rx="1" fill="#e74c3c"/>

  <!-- Motion lines -->
  <line x1="90" y1="220" x2="70" y2="220" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="85" y1="230" x2="60" y2="230" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="90" y1="240" x2="70" y2="240" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
